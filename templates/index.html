<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NVMe Failure Predictor</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">NVMe SMART Predictor</p>
        <h1>Predict NVMe Health & Failure Patterns</h1>
        <p>Submit SMART telemetry values and get a live failure risk score with a likely failure mode.</p>
      </div>
    </header>

    <main class="grid-layout">
      <section class="card form-card">
        <h2>Drive Telemetry</h2>
        <div class="preset-grid">
          <button type="button" class="preset-button" data-temp="38.4" data-hours="12500" data-life="22" data-shutdowns="0" data-media="0" data-crc="0">Healthy</button>
          <button type="button" class="preset-button" data-temp="42.7" data-hours="71000" data-life="93" data-shutdowns="1" data-media="1" data-crc="0">Wear-Out</button>
          <button type="button" class="preset-button" data-temp="81.2" data-hours="820" data-life="47" data-shutdowns="0" data-media="3" data-crc="0">Thermal</button>
          <button type="button" class="preset-button" data-temp="35.0" data-hours="15800" data-life="40" data-shutdowns="14" data-media="2" data-crc="0">Power</button>
          <button type="button" class="preset-button" data-temp="62.5" data-hours="18600" data-life="55" data-shutdowns="1" data-media="12" data-crc="4">Firmware</button>
          <button type="button" class="preset-button" data-temp="31.8" data-hours="1800" data-life="18" data-shutdowns="0" data-media="14" data-crc="0">Early-Life</button>
        </div>
        <form id="predict-form">
          <label>
            Temperature (°C)
            <input name="temperature" type="number" step="0.1" value="48.0" required />
          </label>
          <label>
            Power-on Hours
            <input name="power_on_hours" type="number" value="12000" required />
          </label>
          <label>
            Life Used (%)
            <input name="life_used" type="number" value="62" min="0" max="100" required />
          </label>
          <label>
            Unsafe Shutdowns
            <input name="unsafe_shutdowns" type="number" value="2" min="0" required />
          </label>
          <label>
            Media Errors
            <input name="media_errors" type="number" value="1" min="0" required />
          </label>
          <label>
            CRC Errors
            <input name="crc_errors" type="number" value="0" min="0" required />
          </label>

          <button type="submit" class="button-primary">Predict Failure</button>
        </form>
      </section>

      <section class="card result-card">
        <div id="result-placeholder" class="result-placeholder">
          <p>Enter SMART values and click Predict to see your drive health.</p>
        </div>
      </section>
    </main>
  </div>

  <script>
    const form = document.getElementById('predict-form');
    const resultPlaceholder = document.getElementById('result-placeholder');
    const presetButtons = document.querySelectorAll('.preset-button');

    presetButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const values = {
          temperature: button.dataset.temp,
          power_on_hours: button.dataset.hours,
          life_used: button.dataset.life,
          unsafe_shutdowns: button.dataset.shutdowns,
          media_errors: button.dataset.media,
          crc_errors: button.dataset.crc,
        };

        Object.entries(values).forEach(([name, value]) => {
          const field = form.elements[name];
          if (field) {
            field.value = value;
          }
        });

        resultPlaceholder.innerHTML = `<p class="loading">Loaded sample values for ${button.textContent}.</p>`;
      });
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      resultPlaceholder.innerHTML = '<p class="loading">Predicting...</p>';

      const formData = new FormData(form);
      const payload = {};
      for (const [key, value] of formData.entries()) {
        payload[key] = Number(value);
      }

      try {
        const response = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'Prediction failed');
        }

        resultPlaceholder.innerHTML = `
          <div class="result-badge">
            <span>Prediction</span>
            <strong>${data.prediction}</strong>
          </div>
          <div class="result-row">
            <div>
              <p class="label">Failure Risk</p>
              <p class="value">${data.failure_risk}</p>
            </div>
            <div>
              <p class="label">Likely Failure Mode</p>
              <p class="value">${data.possible_failure_mode}</p>
            </div>
          </div>
        `;
      } catch (error) {
        resultPlaceholder.innerHTML = `<p class="error">${error.message}</p>`;
      }
    });
  </script>
</body>
</html>
